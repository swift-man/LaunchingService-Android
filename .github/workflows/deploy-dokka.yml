name: Deploy Dokka

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-dokka-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4

      - name: Build Dokka
        run: ./gradlew :launching-service:dokkaGeneratePublicationHtml

      - name: Verify Dokka output
        run: test -f ./launching-service/build/dokka/html/index.html

      - name: Deploy to swift-man/docs
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.DOCS_DEPLOY_KEY }}
          external_repository: swift-man/docs
          publish_branch: main
          publish_dir: ./launching-service/build/dokka/html
          destination_dir: LaunchingService-Android
          keep_files: true
          commit_message: "Deploy LaunchingService Android Dokka from ${{ github.repository }}@${{ github.sha }}"
