name: Android

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Test
        run: ./gradlew test
      - name: Lint
        run: ./gradlew lint
      - name: Build
        run: ./gradlew assembleDebug
      - name: Verify local publication
        run: ./gradlew :launching-service:publishToMavenLocal
